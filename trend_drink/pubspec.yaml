name: trenddrink
description: A modern cafe beverage learning experience with AI assistant and immersive recipes.
publish_to: none
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <5.0.0"
  flutter: ">=3.10.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  cached_network_image: ^3.2.3
  collection: ^1.19.0
  google_generative_ai: ^0.4.7
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  uuid: ^4.0.0
  dio: ^5.4.0
  window_manager: ^0.4.3
  flutter_animate: ^4.5.0
  connectivity_plus: ^5.0.0
  package_info_plus: ^4.0.0
  url_launcher: ^6.2.0
  flutter_local_notifications: ^14.0.0
  desktop_drop: ^0.7.1
  file_selector: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - Assets/photo/
    - Assets/photos/
    - Assets/Categories/çay/
    - Assets/Categories/fit/
    - Assets/Categories/frozen/
    - Assets/Categories/kahve/
    - Assets/Categories/kokteyl/
    - Assets/Categories/smoothie/
    - Assets/Categories/soda/
